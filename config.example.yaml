llm:
  provider_name: openai_compatible
  base_url: https://api.openai.com/v1
  api_key: ""
  model: gpt-4o-mini
  model_context_window: 128000
  model_auto_compact_token_limit: 96000
  # Privacy mode automatically prefers an ONNX GenAI model bundle when present.
  # Set onnx_model_path or MARVIS_ONNX_MODEL_PATH to a Qwen2.5-3B ONNX GenAI directory/config,
  # or place the bundle under ./.marvis_data/models. onnx_execution_provider may be DirectML,
  # OpenVINO, CPU, or blank for automatic preference.
  onnx_model_path: ""
  onnx_execution_provider: ""
  embedding_model: text-embedding-3-small
  temperature: 0.2
  max_tokens: 1600
  timeout: 30
  llm_api_max_retries: 2
  llm_api_retry_backoff_seconds: 0.25
  llm_api_circuit_failure_threshold: 5
  llm_api_circuit_cooldown_seconds: 30.0

paths:
  data_dir: ./.marvis_data
  skill_directories:
    - ./.marvis_data/skills
  allowed_directories:
    - ./test_data/files/workspace
  app_allowlist:
    - notepad
    - calculator
    - calc

privacy:
  mode: efficiency
  allow_cloud_context: false
  allow_file_content_upload: false
  allow_browser_network: false
  strict_state_machine: false
  jwt_secret: ""
  browser_max_page_bytes: 250000
  document_max_chars_to_llm: 30000
  browser_screenshot_dir: ""

orchestration:
  recovery_max_retries: 3
  execution_engines: dual
  default_engine: auto
  agent_loop_max_turns: 30
  run_event_retention_days: 30
  context_auto_compact_enabled: true
  context_micro_compact_enabled: true
  context_history_snip_enabled: true
  context_session_memory_enabled: true
  context_warning_buffer_tokens: 20000
  context_error_buffer_tokens: 20000
  context_manual_compact_buffer_tokens: 3000
  context_recent_message_limit: 24
  context_micro_compact_age: 8
  context_micro_compact_tool_result_chars: 1200
  context_history_snip_threshold: 160
  context_history_snip_keep_recent: 80
  context_session_summary_limit: 12000
