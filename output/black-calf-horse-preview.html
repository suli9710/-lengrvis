<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Black Calf-Horse Animated Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #e8e8e5;
        font-family: Arial, Helvetica, sans-serif;
      }

      .stage {
        width: min(88vw, 411px);
        aspect-ratio: 137 / 147;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 16px 44px rgb(0 0 0 / 16%);
        background: #f4f4f2;
      }

      img {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <img src="./black-calf-horse-animated.svg" alt="会动的黑色小牛马" />
    </main>
  </body>
</html>
